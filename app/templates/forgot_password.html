{% extends "base.html" %} {% block title %}Forgot Password{% endblock %} {%
block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Forgot Password?</h4>
        <p class="text-muted mb-4">
          Enter your email or username and we'll send you a 6-digit OTP to reset
          your\n password.
        </p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Email or Username</label>
            <input
              type="text"
              name="identifier"
              class="form-control"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100 mb-2">
            Send OTP
          </button>
        </form>
        <p class="mt-3 mb-0 text-center">
          <a href="{{ url_for('main.login') }}">Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
