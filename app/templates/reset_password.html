{% extends "base.html" %} {% block title %}Reset Password{% endblock %} {% block
content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Reset Password</h4>
        <p class="text-muted mb-4">Enter new password for {{ username }}.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input
              type="password"
              name="confirm"
              class="form-control"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100">
            Reset Password
          </button>
        </form>
        <p class="mt-3 mb-0 text-center">
          <a href="{{ url_for('main.login') }}">Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
